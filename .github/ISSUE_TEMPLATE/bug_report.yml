name: Bug Report
description: File a bug report to help us improve
title: "[Bug]: "
labels: ["bug", "P2"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this bug? Please select the appropriate priority level.
      options:
        - P0 (system down, data loss, security vulnerability)
        - P1 (major feature broken, significant user impact)
        - P2 (feature impaired, workaround available)
        - P3 (minor issue, cosmetic, nice-to-have)
      default: 2
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what you see!
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen.
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happens.
      placeholder: What actually happens?
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: |
        Please provide relevant environment details:
        - Browser/Device
        - Operating System
        - App Version
      placeholder: |
        Browser: Chrome 120.0
        OS: macOS 14.0
        Version: 1.2.3
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Add any other context about the problem here. Include screenshots, logs, or error messages if available.
      placeholder: Any additional information that might help us understand the issue better.
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs/Screenshots
      description: If applicable, add logs or screenshots to help explain your problem.
      placeholder: Paste logs or drag & drop screenshots here.
    validations:
      required: false
