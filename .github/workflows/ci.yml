name: CI

# App CI: build, typecheck, lint, unit tests, and the CLI e2e harness. The merge
# gate for this repo. Deploys no longer run here: staging + production are handled
# by the internal deployer (deploy.bike4mind.com), and PR previews are created on
# demand by maintainers there. See the `ci-complete` job for the single required
# "CI Complete" aggregate check.

on:
  push:
    branches: [main]
  pull_request:
    # Exclude prod-targeted PRs — those are the staging→production promotion
    # and `main` already validates them; a redundant CI run isn't worth it.
    branches-ignore: [prod]
    types: [opened, synchronize, reopened, ready_for_review]
    # NOTE: no workflow-level paths-ignore. The `changes` gate below evaluates
    # the per-PR (merge-base) diff and skips the build/test legs on non-deployable
    # changes, while still reporting the required CI Complete/Run Tests checks (a
    # paths-ignore-skipped workflow never reports them and hangs the PR).
  merge_group:
    branches: [main]

env:
  NODE_VERSION: '24'

# Cancel superseded runs for the same PR so outdated commits stop holding scarce
# ubuntu-latest-m runner slots — the dominant CI-queue bottleneck under heavy PR
# concurrency (jobs were waiting ~15 min for a runner while executing in ~3 min).
# PR-only: pushes to main and merge_group runs are NEVER cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Changes gate: evaluate the changeset that fired this run (whole-PR
  # merge-base diff on pull_request, push range on push) and emit two
  # orthogonal signals: `deployable` (run the build/test legs) and `docs-changed`
  # (currently unconsumed: the Docusaurus build verification was removed
  # because this repo carries only docs-site markdown, not the site
  # scaffolding; the output stays wired for when the check returns).
  # Cheap, always runs, so the required checks always have a status to
  # report. Logic + the default exclude list live in the local composite
  # action. Fails open on both.
  changes:
    # Root of the whole DAG.
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    permissions:
      contents: read
    outputs:
      deployable: ${{ steps.filter.outputs.deployable }}
      docs-changed: ${{ steps.filter.outputs.docs-changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect deployable / docs changes
        id: filter
        uses: ./.github/actions/changes-filter

  # Build the core packages once and publish their dist/ as an artifact. The
  # three gating jobs below (typecheck, lint, test) each restore this artifact
  # instead of rebuilding, then run in parallel — cutting wall clock from the
  # old sequential ~14 min (typecheck + lint + test in one runner) to ~max of
  # the three legs (~10 min). The repo-boundary checks live here because they
  # only need the checked-out source.
  core-build:
    needs: changes
    if: needs.changes.outputs.deployable == 'true'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    name: Core Build
    timeout-minutes: 15
    permissions:
      contents: read

    outputs:
      core-content-hash: ${{ steps.core-hash.outputs.content_hash }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # Pre-merge gate: a PR may point premium-overlay.lock.json at a b4m-overwatch
      # BRANCH while preview-testing a premium change, but that must be bumped to a
      # 40-char SHA before landing on main. This fails the merge queue so a branch
      # pin can't reach main. (The deploy-time backstop moved to the internal
      # deployer along with deploys.)
      # Iterates ALL keys in the lock file, so a future overlay (b4m-tavern, …) is
      # covered without editing this step. The same [0-9a-f]{40} check
      # `pnpm premium:pin --check`
      # (scripts/premium-pin.mjs) runs locally - keep the two in sync if this
      # regex ever changes.
      - name: Verify premium overlay pins are SHAs (merge-queue gate)
        if: github.event_name == 'merge_group'
        run: |
          python3 - <<'PY'
          import json, re, sys
          try:
              pins = json.load(open('premium-overlay.lock.json'))
          except Exception as e:
              print(f"::error::Could not read premium-overlay.lock.json: {e}")
              sys.exit(1)
          bad = {k: v for k, v in pins.items() if not re.fullmatch(r'[0-9a-f]{40}', str(v))}
          for k, v in bad.items():
              print(f"::error::premium-overlay.lock.json '{k}' must pin a 40-char SHA before merging to main (got: {v}). Bump it to the merged commit SHA.")
          if bad:
              sys.exit(1)
          for k, v in pins.items():
              print(f"Premium overlay pin verified: {k}={v}")
          PY

      - name: Check for API files missing baseApi()
        run: bash scripts/check-no-baseapi.sh

      - name: Check user $lookup field projections
        run: node scripts/check-user-lookup-projection.mjs

      - name: Check deploy contract matches infra
        run: python3 scripts/check-deploy-contract.py





      - name: Check for account-tied IDs in shippable code (open-core)
        run: bash scripts/check-no-account-ids.sh
        env:
          # Real account IDs + brand domain live in CI config, not in the shipped
          # script. Unset on a public fork → those two checks are skipped.
          DENY_ACCOUNT_IDS: ${{ vars.DENY_ACCOUNT_IDS }}
          DENY_BRAND_DOMAINS: ${{ vars.DENY_BRAND_DOMAINS }}

      - name: Verify open-core snapshot export-ignore exclusions
        run: |
          if [ -f scripts/check-export-ignore.sh ]; then
            bash scripts/check-export-ignore.sh
          else
            echo "check-export-ignore.sh absent (post-cut snapshot) — skipping"
          fi

      - name: Calculate core packages content hash
        id: core-hash
        run: |
          TREE_HASH_B4M=$(git ls-tree -r HEAD b4m-core packages/database | awk '{print $3}' | sort | md5sum | awk '{print $1}')
          CONFIG_HASH=$(git ls-tree HEAD package.json pnpm-lock.yaml pnpm-workspace.yaml tsconfig.json 2>/dev/null | awk '{print $3}' | sort | md5sum | awk '{print $1}')
          CONTENT_HASH=$(echo "${TREE_HASH_B4M}${CONFIG_HASH}" | md5sum | awk '{print $1}')
          echo "content_hash=$CONTENT_HASH" >> $GITHUB_OUTPUT
          echo "Core packages content hash: $CONTENT_HASH"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --recursive

      - name: Build bike4mind core packages
        run: pnpm core:build

      - name: Upload core build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: core-build-${{ steps.core-hash.outputs.content_hash }}
          path: |
            b4m-core/*/dist
            packages/database/dist
          retention-days: 7
          if-no-files-found: error

  typecheck:
    needs: core-build
    # Standard runner: tsgo (native TS) is fast and low-memory and runs against
    # the prebuilt core artifact, so this leg is I/O-bound, not CPU/memory-bound.
    # Keeping it off the capped ubuntu-latest-m pool frees a slot per PR.
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    name: Type Check
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --recursive

      - name: Download core build artifacts
        id: download-core
        uses: actions/download-artifact@v7
        with:
          name: core-build-${{ needs.core-build.outputs.core-content-hash }}
          # Artifact paths are relative to the repo root (the common ancestor of
          # b4m-core/*/dist and packages/database/dist).
          path: .
        continue-on-error: true

      - name: Build bike4mind core packages (fallback)
        if: steps.download-core.outcome == 'failure'
        run: pnpm core:build

      - name: Run premium glue codegen
        run: pnpm --filter @bike4mind/client run codegen

      - name: Generate SST types
        run: pnpm sst install
        env:
          CI: 'true'

      # Fast typecheck: tsgo (TypeScript 7.0 native) runs first per package; on any
      # failure it falls back to classic tsc, the authoritative gate. All packages
      # are currently tsgo-clean, so tsc only runs if tsgo regresses or diverges.
      # See typecheck-report.md.
      - name: Type check (tsgo, tsc fallback)
        run: pnpm -w typecheck:fast && pnpm --recursive typecheck:fast

      # The root /infra SST files are excluded from the root tsconfig and have no
      # package.json, so neither -w nor --recursive covers them. Typecheck them
      # explicitly here (after SST types are generated above) so infra type errors
      # gate PRs instead of surfacing at deploy time. See #9155.
      - name: Type check infra (SST)
        run: pnpm typecheck:infra

  lint:
    needs: core-build
    # Standard runner: ESLint is I/O-bound, not CPU/memory-bound. Off the capped
    # ubuntu-latest-m pool to free a slot per PR.
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    name: Lint
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --recursive

      - name: Download core build artifacts
        id: download-core
        uses: actions/download-artifact@v7
        with:
          name: core-build-${{ needs.core-build.outputs.core-content-hash }}
          # Artifact paths are relative to the repo root (the common ancestor of
          # b4m-core/*/dist and packages/database/dist).
          path: .
        continue-on-error: true

      - name: Build bike4mind core packages (fallback)
        if: steps.download-core.outcome == 'failure'
        run: pnpm core:build

      - name: Run premium glue codegen
        run: pnpm --filter @bike4mind/client run codegen

      - name: Generate SST types
        run: pnpm sst install
        env:
          CI: 'true'

      - name: Lint (errors only)
        run: pnpm exec eslint . --quiet --cache --cache-location node_modules/.cache/eslint/

  # Tests run as a matrix of shards so wall time is the slowest shard, not the
  # serial sum. The heavy suites are isolated onto their own runners:
  #   - client: the large apps/client suite (thousands of fast files) — alone so
  #     it keeps the whole box for file parallelism.
  #   - services: by far the heaviest remaining package (test-file count and
  #     Mongo-backed setup cost), alone so it doesn't drag down a shared bucket.
  #   - cli-slack, data: hand-grouped buckets of the next-heaviest packages, kept
  #     under a bounded per-package worker pool (VITEST_MAX_WORKERS) so concurrent
  #     packages don't oversubscribe CPU. See vitest.shared.ts.
  #   - misc: a NEGATION catch-all (every non-client package minus the ones
  #     explicitly placed above) instead of an explicit include list. This makes
  #     bucket coverage complete by construction: a package with a `test` script
  #     that isn't named in services/cli-slack/data always lands in misc, so it
  #     can never be silently dropped from the matrix. Moving a package into one
  #     of the named buckets requires adding it there AND excluding it here, or it
  #     will run twice; there's no automated guard against that, so update both
  #     when rebalancing.
  # The `test` job below aggregates these shards into the required "Run Tests"
  # status check.
  test-shards:
    needs: core-build
    # Self-hosted org pool (philips-labs/terraform-aws-github-runner, m6a/m6i.2xlarge,
    # 8 vCPU / 32 GB) instead of the GitHub-hosted ubuntu-latest-m larger-runner pool,
    # which is capped at 10 concurrent org-wide. The test shard fan-out was a
    # dominant consumer of those 10 slots; moving it off frees the cap and cuts cost.
    # Matches polaris's test runner (_test.yml).
    runs-on: ${{ vars.RUNNER_LABEL_HEAVY || 'ubuntu-latest-m' }}
    name: Run Tests (${{ matrix.shard.name }})
    timeout-minutes: 20
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        shard:
          # Single-package shards own the whole runner, so no worker cap.
          - name: client
            filter: '--filter @bike4mind/client'
            workers: ''
          - name: services
            filter: '--filter @bike4mind/services'
            workers: ''
          # Many packages run concurrently in the buckets below; cap each
          # package's pool so `workspace-concurrency (4) x workers ~= cores`,
          # no oversubscription.
          - name: cli-slack
            filter: '--filter @bike4mind/cli --filter @bike4mind/slack --filter @bike4mind/voice'
            workers: '25%'
          - name: data
            filter: '--filter @bike4mind/common --filter @bike4mind/database --filter @bike4mind/db-core --filter @bike4mind/core'
            workers: '25%'
          - name: misc
            filter: "--filter '!@bike4mind/client' --filter '!@bike4mind/services' --filter '!@bike4mind/cli' --filter '!@bike4mind/slack' --filter '!@bike4mind/voice' --filter '!@bike4mind/common' --filter '!@bike4mind/database' --filter '!@bike4mind/db-core' --filter '!@bike4mind/core'"
            workers: '25%'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --recursive

      - name: Download core build artifacts
        id: download-core
        uses: actions/download-artifact@v7
        with:
          name: core-build-${{ needs.core-build.outputs.core-content-hash }}
          # Artifact paths are relative to the repo root (the common ancestor of
          # b4m-core/*/dist and packages/database/dist).
          path: .
        continue-on-error: true

      - name: Build bike4mind core packages (fallback)
        if: steps.download-core.outcome == 'failure'
        run: pnpm core:build

      - name: Download ripgrep binary (for grep_search tests)
        run: |
          POSTINSTALL_PATH=$(find node_modules/.pnpm -name "postinstall.js" -path "*/@vscode/ripgrep/lib/postinstall.js" -type f | head -1)
          if [ -n "$POSTINSTALL_PATH" ]; then
            node "$POSTINSTALL_PATH"
          fi
        continue-on-error: true

      - name: Run premium glue codegen
        run: pnpm --filter @bike4mind/client run codegen

      - name: Generate SST types
        run: pnpm sst install
        env:
          CI: 'true'

      - name: Run Tests (${{ matrix.shard.name }})
        run: pnpm --recursive --workspace-concurrency=4 ${{ matrix.shard.filter }} test
        env:
          CI: true
          VITEST_MAX_WORKERS: ${{ matrix.shard.workers }}

  # Aggregate gate for the sharded test matrix. Branch protection requires a
  # status check literally named "Run Tests"; the matrix above reports per-shard
  # names ("Run Tests (client)", …), so this job re-exposes the exact required
  # context and passes only when every shard succeeded.
  test:
    name: Run Tests
    needs: [changes, test-shards]
    # Run whenever the gate said deployable (always() within that, so a failed
    # shard is still caught by the assertion below). On a non-deployable run the
    # shards were skipped, so this aggregator skips too — a skipped required
    # check counts as passing, instead of failing on skipped shards.
    if: always() && needs.changes.outputs.deployable == 'true'
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    permissions:
      contents: read
    steps:
      - name: Verify all test shards passed
        run: |
          result='${{ needs.test-shards.result }}'
          echo "test-shards result: $result"
          test "$result" = "success"

  # Dedicated job for the CLI end-to-end harness (packages/cli/test/e2e/). Kept
  # separate from both the unit `test-shards` matrix and the `test` fan-in gate
  # so it has its own toolchain setup, its own visible status check, and runs in
  # parallel with the unit shards (both only need `core-build`).
  #
  # The harness lives in a separate `test:e2e` script that `pnpm --recursive
  # test` does not run, so it must be invoked explicitly. The build step
  # populates dist/ first: the bundle-size baseline checks read real dist/ and a
  # guard test fails loudly in CI if dist/ is missing, so a size regression
  # can't slip through by silently skipping. This is the gate that protects the
  # packages/cli/src/index.tsx decomposition (#8554).
  cli-e2e:
    name: CLI e2e harness
    needs: core-build
    # Standard runner: builds the CLI and runs the bundle-baseline harness — a
    # light, I/O-bound leg. Off the capped ubuntu-latest-m pool to free a slot.
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          submodules: false
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.pnpm-store
            node_modules
            */*/node_modules
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile --recursive

      - name: Download core build artifacts
        id: download-core
        uses: actions/download-artifact@v7
        with:
          name: core-build-${{ needs.core-build.outputs.core-content-hash }}
          # Artifact paths are relative to the repo root (the common ancestor of
          # b4m-core/*/dist and packages/database/dist).
          path: .
        continue-on-error: true

      - name: Build bike4mind core packages (fallback)
        if: steps.download-core.outcome == 'failure'
        run: pnpm core:build

      - name: Run premium glue codegen
        run: pnpm --filter @bike4mind/client run codegen

      - name: Generate SST types
        run: pnpm sst install
        env:
          CI: 'true'

      # Build the CLI so the e2e bundle-baseline checks run against real dist/.
      - name: Build CLI (for e2e bundle baseline)
        run: pnpm --filter @bike4mind/cli build

      - name: Run CLI e2e harness
        run: pnpm --filter @bike4mind/cli test:e2e
        env:
          CI: true

  # verify-docs-build removed: the Docusaurus scaffolding (docs-site/package.json,
  # lockfile, config) is not tracked in this repo, so the build can never succeed
  # here and was failing the required CI Complete check on every docs-touching PR.
  # Markdown content is still validated by the help-content tests in the test
  # suite. Restore the job (and .github/workflows/_verify-docs-build.yml) when
  # the scaffolding lands.

  # ============================================================
  # CI gate aggregation. The branch rulesets (main-protection + prod-protection)
  # require a single status check named exactly "CI Complete". Deploy moved out
  # of this repo to the internal deployer, so there is no deploy to gate; this
  # job re-exposes one stable check that turns red if any CI leg failed.
  #
  # Red when ANY CI leg (changes/core-build/typecheck/lint/test/cli-e2e)
  # genuinely FAILED. Green when everything succeeded OR was legitimately
  # skipped (a non-deployable change skips core-build..cli-e2e, and a skipped
  # required check counts as passing). This surfaces typecheck/lint/cli-e2e
  # failures (none of which are individually required checks) through the one
  # required "CI Complete" check instead of letting them pass silently.
  #
  # NOTE: this job name IS the required-check context. Renaming it must happen
  # in lockstep with editing both rulesets, or a required check with no matching
  # job hangs every PR.
  # ============================================================
  ci-complete:
    name: CI Complete
    needs: [changes, core-build, typecheck, lint, test, cli-e2e]
    if: always()
    runs-on: ${{ vars.RUNNER_LABEL || 'ubuntu-latest-m' }}
    steps:
      - name: Report CI result
        env:
          CHANGES: ${{ needs.changes.result }}
          CORE_BUILD: ${{ needs.core-build.result }}
          TYPECHECK: ${{ needs.typecheck.result }}
          LINT: ${{ needs.lint.result }}
          TEST: ${{ needs.test.result }}
          CLI_E2E: ${{ needs.cli-e2e.result }}
        run: |
          echo "results: changes=$CHANGES core-build=$CORE_BUILD typecheck=$TYPECHECK lint=$LINT test=$TEST cli-e2e=$CLI_E2E"
          # A CI leg that genuinely failed flips the check red. Skipped
          # (non-deployable change) is treated as passing.
          for r in "$CHANGES" "$CORE_BUILD" "$TYPECHECK" "$LINT" "$TEST" "$CLI_E2E"; do
            if [ "$r" = "failure" ]; then
              echo "::error::A CI gate failed; failing the required check."
              exit 1
            fi
          done
          echo "CI succeeded or was legitimately skipped."

