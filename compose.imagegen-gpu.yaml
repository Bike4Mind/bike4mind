# NVIDIA GPU acceleration for the bundled `imagegen` service (SD.Next).
#
# Requires an NVIDIA GPU + driver on the host AND the NVIDIA Container Toolkit
# configured for Docker (https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html).
# Verify with: `docker run --rm --gpus all ubuntu nvidia-smi`.
#
# Use it as a second -f alongside the base stack, with the `imagegen` profile:
#   docker compose -f compose.selfhost.yaml -f compose.imagegen-gpu.yaml \
#     --env-file .env.selfhost --profile imagegen up -d
#
# No GPU (or no toolkit)? Skip this file. The base `imagegen` service runs
# CPU-only and works everywhere (just slow: ~1-3 min/image at 512x512).
name: bike4mind-selfhost

services:
  imagegen:
    # Drop `--use-cpu all` so SD.Next uses the GPU (CUDA) reserved below.
    command: ['python', 'launch.py', '--listen', '--api', '--quick', '--log', 'sdnext.log']
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
